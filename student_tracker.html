<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macromedia Student Application Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f6f9;color:#1a1a1a;padding:20px}
.app{max-width:1300px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;background:#fff;padding:16px 20px;border-radius:12px;border:1px solid #e0e0e0}
.header h2{font-size:18px;font-weight:600;color:#0a1a3e}
.header p{font-size:13px;color:#666;margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e0e0e0}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600;color:#185FA5}
.controls{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.controls input,.controls select{font-size:13px;padding:7px 11px;height:34px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a}
.controls input{flex:1;min-width:160px}
.btn{padding:7px 16px;height:34px;font-size:13px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#185FA5;border-color:#185FA5;color:#fff}
.btn-primary:hover{background:#0C447C}
.btn-sm{padding:3px 10px;height:26px;font-size:12px;border-radius:6px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a;cursor:pointer}
.btn-sm:hover{background:#f0f0f0}
.btn-danger{border-color:#A32D2D;color:#A32D2D}
.btn-danger:hover{background:#FCEBEB}
.table-wrap{overflow-x:auto;border:1px solid #e0e0e0;border-radius:12px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f9fb;padding:10px 12px;text-align:left;font-weight:600;font-size:11px;color:#555;border-bottom:1px solid #e0e0e0;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f9fb}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.b-new{background:#E6F1FB;color:#0C447C}
.b-review{background:#FAEEDA;color:#633806}
.b-offer{background:#EAF3DE;color:#27500A}
.b-visa{background:#EEEDFE;color:#3C3489}
.b-enrolled{background:#E1F5EE;color:#085041}
.b-rejected{background:#FCEBEB;color:#791F1F}
.b-yes{background:#EAF3DE;color:#27500A}
.b-pending{background:#FAEEDA;color:#633806}
.empty{text-align:center;padding:2rem;color:#999;font-size:13px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.drawer{background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.drawer-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #e0e0e0;flex-shrink:0}
.drawer-header h3{font-size:15px;font-weight:600;color:#0a1a3e}
.tabs{display:flex;border-bottom:1px solid #e0e0e0;overflow-x:auto;flex-shrink:0}
.tab{padding:9px 16px;font-size:12px;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:600}
.panels{overflow-y:auto;flex:1;padding:0}
.tab-panel{padding:1.25rem;display:none}
.tab-panel.active{display:block}
.sec-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:#777;font-weight:500}
.fg input,.fg select,.fg textarea{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a}
.fg textarea{resize:vertical;min-height:60px}
.fg.full{grid-column:1/-1}
.view-val{font-size:13px;font-weight:600;color:#1a1a1a;padding:6px 0}
.drawer-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #e0e0e0;flex-shrink:0;background:#fff}
</style>
</head>

    app_id:"MAC-2025-00"+nid,app_date:"",intake:"SS 2025",year:"2025",program:"",campus:"Munich",source:"",
    passport_copy:"Pending",mks10:"Pending",mks12:"Pending",grad_cert:"Pending",cv:"Pending",sop:"Pending",lor:"Pending",
    eng_type:"IELTS",eng_score:"",tuition:"",blocking:"Pending",pay_date:"",
    curr_status:"New",uni_response:"",offer_letter:"No",visa_applied:"No",visa_status:"-",enrolled:"No",remarks:""};
  var vm=viewMode;
  document.getElementById("drawer-title").textContent=vm?"View: "+d.full_name:editing?"Edit: "+d.full_name:"Add New Student";
  document.getElementById("edit-toggle-btn").style.display=editing&&vm?"":"none";
  document.getElementById("drawer-footer").style.display=vm?"none":"flex";
  document.getElementById("save-btn").textContent=editing?"Save Changes":"Add Student";

  document.getElementById("tabs").innerHTML=TABS.map((t,i)=>
    '<div class="tab'+(activeTab===i?" active":"")+'" onclick="swTab('+i+')">'+t+'</div>').join("");

  var panels=[panel0(d,vm),panel1(d,vm),panel2(d,vm),panel3(d,vm),panel4(d,vm)];
  document.getElementById("panels").innerHTML=panels.map((p,i)=>
    '<div class="tab-panel'+(activeTab===i?" active":"")+'" id="panel-'+i+'">'+p+'</div>').join("");
}

function swTab(i){activeTab=i;renderDrawerContent();}

function fgf(id,label,val,vm,type){
  return'<div class="fg"><label>'+label+'</label>'+(vm?'<div class="view-val">'+(val||"-")+'</div>':'<input type="'+(type||"text")+'" id="'+id+'" value="'+(val||"")+'"></div>')+(vm?'</div>':'');
}
function fgs(id,label,val,vm,opts){
  return'<div class="fg"><label>'+label+'</label>'+(vm?'<div class="view-val">'+(val||"-")+'</div>':'<select id="'+id+'">'+opts.map(o=>'<option'+(val===o?" selected":"")+'>'+o+'</option>').join("")+'</select>')+'</div>';
}

function panel0(d,vm){
  return'<p class="sec-title">Personal Information</p><div class="form-grid">'+
    fgf("p-name","Full Name",d.full_name,vm)+fgf("p-dob","Date of Birth",d.dob,vm,"date")+
    fgs("p-gender","Gender",d.gender,vm,["Male","Female","Other"])+fgf("p-nationality","Nationality",d.nationality,vm)+
    fgf("p-passport","Passport Number",d.passport,vm)+fgf("p-email","Email",d.email,vm,"email")+
    fgf("p-phone","Phone Number",d.phone,vm,"tel")+'</div>';
}
function panel1(d,vm){
  return'<p class="sec-title">Academic Background</p><div class="form-grid">'+
    fgf("a-10pct","10th Percentage",d.pct10,vm)+fgf("a-10board","10th Board",d.board10,vm)+
    fgf("a-12pct","12th Percentage",d.pct12,vm)+fgf("a-12board","12th Board",d.board12,vm)+
    fgf("a-gpct","Graduation %",d.gradpct,vm)+fgf("a-gfield","Graduation Field",d.gradfield,vm)+
    '<div class="fg full"><label>University Name</label>'+(vm?'<div class="view-val">'+(d.univname||"-")+'</div>':'<input id="a-univ" value="'+(d.univname||"")+'">'+
    '</div>')+'</div>';
}
function panel2(d,vm){
  return'<p class="sec-title">Application Details</p><div class="form-grid">'+
    fgf("d-appid","Application ID",d.app_id,vm)+fgf("d-appdate","Application Date",d.app_date,vm,"date")+
    fgs("d-intake","Intake",d.intake,vm,["SS 2025","WS 2025-26","SS 2026","WS 2026-27"])+fgf("d-year","Year",d.year,vm)+
    fgf("d-program","Program Applied",d.program,vm)+fgs("d-campus","Campus",d.campus,vm,["Munich","Hamburg","Berlin","Cologne","Stuttgart"])+
    fgf("d-source","Application Source",d.source,vm)+'</div>';
}
function panel3(d,vm){
  var docs=[["passport_copy","Passport Copy"],["mks10","10th Marksheet"],["mks12","12th Marksheet"],
    ["grad_cert","Graduation Certificate"],["cv","CV / Resume"],["sop","SOP"],["lor","LOR"]];
  return'<p class="sec-title">Document Status</p><div class="form-grid">'+
    docs.map(([k,l])=>fgs("doc-"+k,l,d[k],vm,["Yes","No","Pending"])).join("")+
    fgs("doc-engtype","English Score Type",d.eng_type,vm,["IELTS","TOEFL","Duolingo","PTE","Other"])+
    fgf("doc-engscore","English Score",d.eng_score,vm)+
    fgf("doc-tuition","Tuition Fees (EUR)",d.tuition,vm)+
    fgs("doc-blocking","Blocking Amount Status",d.blocking,vm,["Paid","Pending","Not Required"])+
    fgf("doc-paydate","Payment Date",d.pay_date,vm,"date")+'</div>';
}
function panel4(d,vm){
  return'<p class="sec-title">Application Status</p><div class="form-grid">'+
    fgs("s-status","Current Status",d.curr_status,vm,["New","Under Review","Offer Issued","Visa Applied","Enrolled","Rejected"])+
    fgf("s-uniresponse","University Response",d.uni_response,vm)+
    fgs("s-offer","Offer Letter",d.offer_letter,vm,["Yes","No","Pending"])+
    fgs("s-visaapp","Visa Applied",d.visa_applied,vm,["Yes","No"])+
    fgs("s-visastatus","Visa Status",d.visa_status,vm,["Approved","Rejected","In Process","Pending","-"])+
    fgs("s-enrolled","Enrollment Confirmed",d.enrolled,vm,["Yes","No"])+
    '<div class="fg full"><label>Remarks</label>'+(vm?'<div class="view-val">'+(d.remarks||"-")+'</div>':'<textarea id="s-remarks">'+(d.remarks||"")+'</textarea>')+'</div></div>';
}

function gv(id){var el=document.getElementById(id);return el?el.value:"";}
function save(){
  var obj={
    full_name:gv("p-name"),dob:gv("p-dob"),gender:gv("p-gender"),nationality:gv("p-nationality"),
    passport:gv("p-passport"),email:gv("p-email"),phone:gv("p-phone"),
    pct10:gv("a-10pct"),board10:gv("a-10board"),pct12:gv("a-12pct"),board12:gv("a-12board"),
    gradpct:gv("a-gpct"),gradfield:gv("a-gfield"),univname:gv("a-univ"),
    app_id:gv("d-appid"),app_date:gv("d-appdate"),intake:gv("d-intake"),year:gv("d-year"),
    program:gv("d-program"),campus:gv("d-campus"),source:gv("d-source"),
    passport_copy:gv("doc-passport_copy"),mks10:gv("doc-mks10"),mks12:gv("doc-mks12"),
    grad_cert:gv("doc-grad_cert"),cv:gv("doc-cv"),sop:gv("doc-sop"),lor:gv("doc-lor"),
    eng_type:gv("doc-engtype"),eng_score:gv("doc-engscore"),tuition:gv("doc-tuition"),
    blocking:gv("doc-blocking"),pay_date:gv("doc-paydate"),
    curr_status:gv("s-status"),uni_response:gv("s-uniresponse"),offer_letter:gv("s-offer"),
    visa_applied:gv("s-visaapp"),visa_status:gv("s-visastatus"),enrolled:gv("s-enrolled"),
    remarks:gv("s-remarks")
  };
  if(!obj.full_name||!obj.email){alert("Full Name and Email are required.");return;}
  if(editing){obj.id=editing.id;var idx=DB.findIndex(s=>s.id===editing.id);DB[idx]=obj;}
  else{obj.id=nid++;DB.push(obj);}
  closeDrawer();renderTable();
}

renderTable();
</script>
</body>
</html>
